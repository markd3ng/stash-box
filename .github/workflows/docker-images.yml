name: Build & Push Docker Images

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  STASH_BOX_IMAGE: ghcr.io/${{ github.repository }}/stash-box
  POSTGRES_IMAGE: ghcr.io/${{ github.repository }}/postgres

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate version metadata
        id: version
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(date -u +'%Y%m%d')" >> $GITHUB_OUTPUT

      # ── PostgreSQL with extensions ──
      - name: Build & push PostgreSQL image
        uses: docker/build-push-action@v6
        with:
          context: docker/production/postgres
          file: docker/production/postgres/Dockerfile
          push: true
          tags: |
            ${{ env.POSTGRES_IMAGE }}:latest
            ${{ env.POSTGRES_IMAGE }}:${{ steps.version.outputs.sha_short }}
          cache-from: type=gha,scope=postgres
          cache-to: type=gha,mode=max,scope=postgres

      # ── stash-box (multi-stage from source) ──
      - name: Build & push stash-box image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/production/stash-box/Dockerfile
          push: true
          tags: |
            ${{ env.STASH_BOX_IMAGE }}:latest
            ${{ env.STASH_BOX_IMAGE }}:${{ steps.version.outputs.sha_short }}
          cache-from: type=gha,scope=stash-box
          cache-to: type=gha,mode=max,scope=stash-box
